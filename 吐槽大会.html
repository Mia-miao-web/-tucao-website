<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吐槽大会 - 释放你的小宇宙</title>
    <link rel="icon" type="image/png" href="logo_filled.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF6B6B; --primary-dark: #EE5A5A; --secondary: #4ECDC4;
            --accent: #FFE66D; --dark: #2D3436; --light: #F7F9FC;
            --card-bg: #ffffff; --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.15);
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; color: var(--dark); overflow-x: hidden;
        }
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 0;
        }
        .particle {
            position: absolute; width: 10px; height: 10px;
            background: rgba(255,255,255,0.1); border-radius: 50%;
            animation: float 15s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; } 90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* ===== 全新设计的头部 ===== */
        header {
            position: relative; z-index: 10;
            padding: 40px 20px 30px; color: white;
        }
        .header-inner {
            max-width: 900px; margin: 0 auto;
            display: flex; align-items: center; gap: 25px;
        }
        .logo-wrap {
            position: relative; flex-shrink: 0;
        }
        .logo-wrap img {
            width: 80px; height: 80px; border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .logo-wrap:hover img { transform: scale(1.08) rotate(-5deg); }
        .logo-glow {
            position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            background: rgba(255,255,255,0.15); border-radius: 30px;
            filter: blur(20px); z-index: -1;
        }
        .header-text { flex: 1; }
        .header-title {
            font-size: 2.8rem; font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, #fff 0%, #ffd6d6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-subtitle {
            font-size: 1rem; opacity: 0.85; margin-top: 6px;
            font-weight: 400; letter-spacing: 2px;
        }
        .header-badge {
            display: inline-block; margin-top: 10px;
            background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 16px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 500;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 40px; position: relative; z-index: 10; }

        /* 统计栏 */
        .stats-bar {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 16px;
            padding: 14px 24px; text-align: center; color: white;
            min-width: 100px; transition: all 0.3s;
        }
        .stat-item:hover {
            background: rgba(255,255,255,0.2); transform: translateY(-3px);
        }
        .stat-number { font-size: 1.6rem; font-weight: 900; display: block; }
        .stat-label { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }

        .input-section {
            background: var(--card-bg); border-radius: 24px; padding: 30px;
            box-shadow: var(--shadow); margin-bottom: 25px;
            transform: translateY(0); transition: transform 0.3s, box-shadow 0.3s;
        }
        .input-section:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
        .input-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .avatar {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.5rem; font-weight: 700; flex-shrink: 0;
        }
        .user-info { flex: 1; }
        .user-name { font-weight: 700; color: var(--dark); font-size: 1.1rem; }
        .user-status { font-size: 0.85rem; color: #999; display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .category-select { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .cat-btn {
            padding: 8px 16px; border: 2px solid #e0e0e0; border-radius: 20px;
            background: white; cursor: pointer; font-size: 0.9rem;
            transition: all 0.3s; font-family: inherit; color: #666;
        }
        .cat-btn:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.05); }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 15px rgba(255,107,107,0.4); }
        textarea {
            width: 100%; min-height: 120px; border: 2px solid #e8e8e8;
            border-radius: 16px; padding: 15px; font-size: 1rem;
            font-family: inherit; resize: vertical; transition: border-color 0.3s; outline: none;
        }
        textarea:focus { border-color: var(--primary); }
        .input-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .char-count { font-size: 0.85rem; color: #999; }
        .char-count.warning { color: var(--primary); font-weight: 700; }
        .submit-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none; padding: 12px 32px; border-radius: 25px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s; font-family: inherit; box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,107,0.6); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* 图片上传 */
        .image-upload { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        .image-upload-btn {
            padding: 8px 16px; background: #f0f0f0; border: 2px dashed #ccc;
            border-radius: 12px; cursor: pointer; font-size: 0.9rem;
            color: #666; transition: all 0.3s;
        }
        .image-upload-btn:hover { border-color: var(--primary); color: var(--primary); }
        .image-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .image-preview-item { position: relative; }
        .image-preview-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
        .image-preview-item .remove-img {
            position: absolute; top: -5px; right: -5px; width: 20px; height: 20px;
            background: var(--primary); color: white; border: none; border-radius: 50%;
            cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center;
        }

        .trending { margin-bottom: 25px; }
        .trending-title { color: white; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .trending-tags { display: flex; gap: 10px; flex-wrap: wrap; }
        .trend-tag {
            background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); color: white;
            padding: 8px 16px; border-radius: 20px; font-size: 0.9rem;
            cursor: pointer; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.3);
        }
        .trend-tag:hover { background: white; color: var(--primary); transform: translateY(-2px); }
        .trend-tag.active { background: white; color: var(--primary); }

        .filter-bar { display: flex; gap: 15px; margin-bottom: 25px; align-items: center; flex-wrap: wrap; }
        .filter-label { color: white; font-weight: 700; font-size: 1.1rem; }
        .filter-btn {
            padding: 8px 18px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3); color: white; border-radius: 20px;
            cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active { background: white; color: var(--primary); border-color: white; }

        .tucao-list { display: flex; flex-direction: column; gap: 20px; }
        .tucao-card {
            background: var(--card-bg); border-radius: 20px; padding: 25px;
            box-shadow: var(--shadow); transition: all 0.3s;
            position: relative; overflow: hidden; animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .tucao-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
        .tucao-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 5px; height: 100%; background: var(--primary); transition: width 0.3s;
        }
        .tucao-card:hover::before { width: 8px; }
        .tucao-card.work::before { background: #3498db; }
        .tucao-card.life::before { background: #2ecc71; }
        .tucao-card.love::before { background: #e74c3c; }
        .tucao-card.social::before { background: #9b59b6; }
        .tucao-card.other::before { background: #f39c12; }

        .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px; }
        .author-info { display: flex; align-items: center; gap: 12px; }
        .author-avatar {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 1.2rem;
        }
        .author-meta { display: flex; flex-direction: column; }
        .author-name { font-weight: 700; color: var(--dark); font-size: 1rem; }
        .post-time { font-size: 0.8rem; color: #999; }
        .category-tag { padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; color: white; }
        .tag-work { background: #3498db; } .tag-life { background: #2ecc71; }
        .tag-love { background: #e74c3c; } .tag-social { background: #9b59b6; }
        .tag-other { background: #f39c12; }
        .tucao-content { font-size: 1.05rem; line-height: 1.7; color: #444; margin-bottom: 15px; word-wrap: break-word; }

        .tucao-images { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .tucao-images img {
            max-width: 200px; max-height: 200px; border-radius: 12px;
            object-fit: cover; cursor: pointer; transition: transform 0.3s;
        }
        .tucao-images img:hover { transform: scale(1.05); }

        .vote-section { margin: 15px 0; padding: 15px; background: #f8f9fa; border-radius: 12px; }
        .vote-title { font-weight: 700; color: var(--dark); margin-bottom: 10px; font-size: 0.95rem; }
        .vote-options { display: flex; flex-direction: column; gap: 8px; }
        .vote-option {
            display: flex; align-items: center; gap: 10px; padding: 10px 15px;
            background: white; border-radius: 10px; cursor: pointer;
            transition: all 0.3s; border: 2px solid transparent;
        }
        .vote-option:hover { border-color: var(--primary); }
        .vote-option.selected { border-color: var(--primary); background: #fff0f0; }
        .vote-bar-bg { flex: 1; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
        .vote-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-dark)); border-radius: 4px; transition: width 0.5s; }
        .vote-count { font-size: 0.85rem; color: #666; min-width: 40px; text-align: right; }

        .card-footer { display: flex; gap: 15px; padding-top: 15px; border-top: 1px solid #f0f0f0; flex-wrap: wrap; }
        .action-btn {
            display: flex; align-items: center; gap: 6px; padding: 8px 16px;
            border-radius: 20px; border: none; background: #f8f9fa; color: #666;
            cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: all 0.3s;
        }
        .action-btn:hover { background: #e9ecef; transform: scale(1.05); }
        .action-btn.liked { background: #ffe0e0; color: var(--primary); }
        .action-btn.liked svg { fill: var(--primary); stroke: var(--primary); }
        .action-btn.hot { background: #fff3cd; color: #856404; }
        .action-count { font-weight: 700; }

        .comments-section {
            margin-top: 15px; padding-top: 15px; border-top: 1px solid #f0f0f0;
            display: none;
        }
        .comments-section.show { display: block; }
        .comment-input-area { display: flex; gap: 10px; margin-bottom: 15px; }
        .comment-input {
            flex: 1; padding: 10px 15px; border: 2px solid #e0e0e0;
            border-radius: 20px; font-family: inherit; font-size: 0.9rem; outline: none;
        }
        .comment-input:focus { border-color: var(--primary); }
        .comment-submit {
            padding: 10px 20px; background: var(--primary); color: white;
            border: none; border-radius: 20px; cursor: pointer; font-family: inherit;
            font-weight: 700; transition: all 0.3s;
        }
        .comment-submit:hover { background: var(--primary-dark); }
        .comment-list { display: flex; flex-direction: column; gap: 12px; }
        .comment-item {
            display: flex; gap: 10px; padding: 12px; background: #f8f9fa;
            border-radius: 12px;
        }
        .comment-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 0.9rem; font-weight: 700; flex-shrink: 0;
        }
        .comment-body { flex: 1; }
        .comment-author { font-weight: 700; color: var(--dark); font-size: 0.9rem; }
        .comment-text { color: #555; font-size: 0.9rem; margin-top: 4px; line-height: 1.5; }
        .comment-time { font-size: 0.75rem; color: #999; margin-top: 4px; }

        .empty-state { text-align: center; padding: 60px 20px; color: white; }
        .empty-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.8; }
        .empty-text { font-size: 1.2rem; opacity: 0.9; }

        .image-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center;
            align-items: center; cursor: pointer;
        }
        .image-modal.show { display: flex; }
        .image-modal img { max-width: 90%; max-height: 90%; border-radius: 12px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }

        .delete-btn {
            position: absolute; top: 15px; right: 15px; background: none;
            border: none; color: #ccc; cursor: pointer; font-size: 1.2rem;
            opacity: 0; transition: all 0.3s; padding: 5px;
        }
        .tucao-card:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--primary); transform: scale(1.2); }

        .hot-badge {
            position: absolute; top: -10px; right: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white; padding: 5px 15px; border-radius: 15px;
            font-size: 0.8rem; font-weight: 700;
            box-shadow: 0 4px 15px rgba(245,87,108,0.4);
            animation: shake 3s infinite;
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            5% { transform: rotate(-5deg); }
            10% { transform: rotate(5deg); }
            15% { transform: rotate(0deg); }
        }

        @media (max-width: 600px) {
            .header-inner { flex-direction: column; text-align: center; gap: 15px; }
            .header-title { font-size: 2rem; }
            .logo-wrap img { width: 60px; height: 60px; }
            .stats-bar { gap: 10px; }
            .stat-item { padding: 10px 16px; min-width: 80px; }
            .input-section { padding: 20px; }
            .tucao-card { padding: 20px; }
            .filter-bar { gap: 10px; }
            .tucao-images img { max-width: 120px; max-height: 120px; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <img src="" alt="预览" id="modalImage">
    </div>

    <header>
        <div class="header-inner">
            <div class="logo-wrap">
                <div class="logo-glow"></div>
                <img src="logo_filled.png" alt="吐槽大会">
            </div>
            <div class="header-text">
                <div class="header-title">吐槽大会</div>
                <div class="header-subtitle">生活不易，来这里释放你的小宇宙</div>
                <div class="header-badge">💬 今日已有 <span id="todayCount">3</span> 条吐槽</div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number" id="statTotal">0</span>
                <span class="stat-label">总吐槽</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="statToday">0</span>
                <span class="stat-label">今日</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="statLikes">0</span>
                <span class="stat-label">总点赞</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="statHot">0</span>
                <span class="stat-label">热门</span>
            </div>
        </div>

        <div class="input-section">
            <div class="input-header">
                <div class="avatar" id="userAvatar">我</div>
                <div class="user-info">
                    <div class="user-name">匿名吐槽者</div>
                    <div class="user-status">
                        <span class="status-dot"></span>
                        <span>在线吐槽中...</span>
                    </div>
                </div>
            </div>

            <div class="category-select">
                <button class="cat-btn active" data-cat="work">💼 工作</button>
                <button class="cat-btn" data-cat="life">🏠 生活</button>
                <button class="cat-btn" data-cat="love">❤️ 感情</button>
                <button class="cat-btn" data-cat="social">👥 社交</button>
                <button class="cat-btn" data-cat="other">🎲 其他</button>
            </div>

            <textarea id="tucaoInput" placeholder="今天有什么想吐槽的？别憋着，说出来会好受些..." maxlength="500"></textarea>

            <div class="image-upload">
                <label class="image-upload-btn" onclick="document.getElementById('imageInput').click()">
                    📷 添加图片
                </label>
                <input type="file" id="imageInput" accept="image/*" multiple style="display: none;" onchange="handleImageUpload(event)">
                <span style="color: #999; font-size: 0.85rem;">最多3张</span>
            </div>
            <div class="image-preview" id="imagePreview"></div>

            <div class="input-footer">
                <span class="char-count" id="charCount">0 / 500</span>
                <button class="submit-btn" id="submitBtn">发射吐槽 ⚡</button>
            </div>
        </div>

        <div class="trending">
            <div class="trending-title">
                <span>🔥</span>
                <span>热门话题</span>
            </div>
            <div class="trending-tags" id="trendingTags">
                <span class="trend-tag" onclick="filterByTag('加班')">#加班</span>
                <span class="trend-tag" onclick="filterByTag('甲方')">#甲方</span>
                <span class="trend-tag" onclick="filterByTag('催婚')">#催婚</span>
                <span class="trend-tag" onclick="filterByTag('房价')">#房价</span>
                <span class="trend-tag" onclick="filterByTag('早八')">#早八</span>
                <span class="trend-tag" onclick="filterByTag('外卖')">#外卖</span>
            </div>
        </div>

        <div class="filter-bar">
            <span class="filter-label">📋 筛选：</span>
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="work">💼 工作</button>
            <button class="filter-btn" data-filter="life">🏠 生活</button>
            <button class="filter-btn" data-filter="love">❤️ 感情</button>
            <button class="filter-btn" data-filter="social">👥 社交</button>
            <button class="filter-btn" data-filter="hot">🔥 最热</button>
        </div>

        <div class="tucao-list" id="tucaoList"></div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">🤔</div>
            <div class="empty-text">这里空空如也，来做第一个吐槽的人吧！</div>
        </div>
    </div>

    <script>
        let tucaos = JSON.parse(localStorage.getItem('tucaos')) || [
            {
                id: 1,
                content: "甲方说'这个logo放大的同时能不能缩小一点'，我当场就想把电脑扣他脸上。做了三年设计，第一次听到这种量子力学要求。",
                category: "work",
                author: "设计狗",
                avatarColor: "linear-gradient(135deg, #667eea, #764ba2)",
                time: Date.now() - 3600000,
                likes: 128,
                comments: 23,
                liked: false,
                images: [],
                commentsList: [
                    { author: "路人甲", text: "太真实了，我也遇到过", time: Date.now() - 3000000 },
                    { author: "打工人", text: "甲方的脑洞比黑洞还大", time: Date.now() - 2800000 }
                ],
                vote: {
                    question: "你遇到过最离谱的甲方要求？",
                    options: [
                        { text: "五彩斑斓的黑", count: 45 },
                        { text: "logo放大的同时缩小", count: 32 },
                        { text: "用PS不要钱的感觉", count: 28 },
                        { text: "先做个方案看看", count: 56 }
                    ],
                    voted: -1
                }
            },
            {
                id: 2,
                content: "早上挤地铁，前面大哥的背包里装了个榴莲吧？那个味道让我怀疑人生，整整闻了40分钟，到公司差点吐在键盘上。",
                category: "life",
                author: "早八人",
                avatarColor: "linear-gradient(135deg, #f093fb, #f5576c)",
                time: Date.now() - 7200000,
                likes: 85,
                comments: 15,
                liked: false,
                images: [],
                commentsList: [
                    { author: "吃瓜群众", text: "哈哈哈有画面了", time: Date.now() - 6000000 }
                ],
                vote: null
            },
            {
                id: 3,
                content: "相亲对象问我：'你平时有什么爱好？' 我说喜欢看书。他说：'看什么书？' 我说《三体》。他说：'哦，科幻啊，我觉得女孩子看那种东西太不切实际了。' 我：？？？",
                category: "love",
                author: "科幻迷",
                avatarColor: "linear-gradient(135deg, #4facfe, #00f2fe)",
                time: Date.now() - 18000000,
                likes: 256,
                comments: 45,
                liked: false,
                images: [],
                commentsList: [
                    { author: "三体粉", text: "让他脱水！", time: Date.now() - 17000000 },
                    { author: "路人乙", text: "这种人不配看科幻", time: Date.now() - 16000000 },
                    { author: "吐槽大师", text: "建议回火星", time: Date.now() - 15000000 }
                ],
                vote: {
                    question: "相亲遇到最无语的话？",
                    options: [
                        { text: "女孩子不用读那么多书", count: 67 },
                        { text: "你工资多少？", count: 45 },
                        { text: "我妈说...", count: 89 },
                        { text: "你会做饭吗？", count: 34 }
                    ],
                    voted: -1
                }
            }
        ];

        let currentCategory = 'work';
        let currentFilter = 'all';
        let searchTag = '';
        let uploadedImages = [];

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            updateStats();
            renderTucaos();
            setupEventListeners();
            updateCharCount();
        });

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.width = particle.style.height = (5 + Math.random() * 10) + 'px';
                container.appendChild(particle);
            }
        }

        function updateStats() {
            const total = tucaos.length;
            const today = tucaos.filter(t => Date.now() - t.time < 86400000).length;
            const likes = tucaos.reduce((sum, t) => sum + t.likes, 0);
            const hot = tucaos.filter(t => t.likes > 100).length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statToday').textContent = today;
            document.getElementById('statLikes').textContent = likes;
            document.getElementById('statHot').textContent = hot;
            document.getElementById('todayCount').textContent = today;
        }

        function setupEventListeners() {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.cat;
                });
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderTucaos();
                });
            });

            const textarea = document.getElementById('tucaoInput');
            textarea.addEventListener('input', updateCharCount);

            document.getElementById('submitBtn').addEventListener('click', submitTucao);

            textarea.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    submitTucao();
                }
            });
        }

        function handleImageUpload(event) {
            const files = event.target.files;
            if (uploadedImages.length + files.length > 3) {
                alert('最多只能上传3张图片');
                return;
            }

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedImages.push(e.target.result);
                    updateImagePreview();
                };
                reader.readAsDataURL(file);
            });
        }

        function updateImagePreview() {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = uploadedImages.map((img, index) => `
                <div class="image-preview-item">
                    <img src="${img}" alt="预览">
                    <button class="remove-img" onclick="removeImage(${index})">×</button>
                </div>
            `).join('');
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            updateImagePreview();
        }

        function updateCharCount() {
            const textarea = document.getElementById('tucaoInput');
            const count = textarea.value.length;
            const counter = document.getElementById('charCount');
            counter.textContent = `${count} / 500`;

            if (count > 450) {
                counter.classList.add('warning');
            } else {
                counter.classList.remove('warning');
            }

            document.getElementById('submitBtn').disabled = count === 0;
        }

        function submitTucao() {
            const textarea = document.getElementById('tucaoInput');
            const content = textarea.value.trim();

            if (!content) return;

            const names = ['吐槽大师', '愤青一号', '路人甲', '键盘侠', '吃瓜群众', '匿名用户', '打工人', '社畜本畜'];
            const colors = [
                'linear-gradient(135deg, #FF6B6B, #EE5A5A)',
                'linear-gradient(135deg, #4ECDC4, #44A08D)',
                'linear-gradient(135deg, #667eea, #764ba2)',
                'linear-gradient(135deg, #f093fb, #f5576c)',
                'linear-gradient(135deg, #4facfe, #00f2fe)',
                'linear-gradient(135deg, #43e97b, #38f9d7)'
            ];

            const newTucao = {
                id: Date.now(),
                content: content,
                category: currentCategory,
                author: names[Math.floor(Math.random() * names.length)],
                avatarColor: colors[Math.floor(Math.random() * colors.length)],
                time: Date.now(),
                likes: 0,
                comments: 0,
                liked: false,
                images: [...uploadedImages],
                commentsList: [],
                vote: null
            };

            tucaos.unshift(newTucao);
            saveTucaos();

            textarea.value = '';
            uploadedImages = [];
            updateImagePreview();
            updateCharCount();
            updateStats();
            renderTucaos();

            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            btn.textContent = '发射成功！🎉';
            btn.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
            }, 1500);
        }

        function renderTucaos() {
            const list = document.getElementById('tucaoList');
            const emptyState = document.getElementById('emptyState');

            let filtered = [...tucaos];

            if (currentFilter !== 'all') {
                if (currentFilter === 'hot') {
                    filtered.sort((a, b) => b.likes - a.likes);
                } else {
                    filtered = filtered.filter(t => t.category === currentFilter);
                }
            }

            if (searchTag) {
                filtered = filtered.filter(t => t.content.includes(searchTag));
            }

            if (filtered.length === 0) {
                list.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            list.innerHTML = filtered.map(tucao => {
                const isHot = tucao.likes > 100;
                const timeStr = formatTime(tucao.time);
                const categoryNames = {
                    work: '💼 工作', life: '🏠 生活', love: '❤️ 感情',
                    social: '👥 社交', other: '🎲 其他'
                };

                const imagesHtml = tucao.images && tucao.images.length > 0 
                    ? `<div class="tucao-images">${tucao.images.map(img => 
                        `<img src="${img}" alt="吐槽图片" onclick="openImageModal('${img}')">`
                    ).join('')}</div>` 
                    : '';

                const voteHtml = tucao.vote ? renderVote(tucao) : '';

                const commentsHtml = `
                    <div class="comments-section" id="comments-${tucao.id}">
                        <div class="comment-input-area">
                            <input type="text" class="comment-input" id="comment-input-${tucao.id}" 
                                placeholder="写下你的评论..." onkeypress="if(event.key==='Enter')submitComment(${tucao.id})">
                            <button class="comment-submit" onclick="submitComment(${tucao.id})">发送</button>
                        </div>
                        <div class="comment-list" id="comment-list-${tucao.id}">
                            ${(tucao.commentsList || []).map(c => `
                                <div class="comment-item">
                                    <div class="comment-avatar">${c.author[0]}</div>
                                    <div class="comment-body">
                                        <div class="comment-author">${escapeHtml(c.author)}</div>
                                        <div class="comment-text">${escapeHtml(c.text)}</div>
                                        <div class="comment-time">${formatTime(c.time)}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;

                return `
                    <div class="tucao-card ${tucao.category}" data-id="${tucao.id}">
                        ${isHot ? '<div class="hot-badge">🔥 热门</div>' : ''}
                        <button class="delete-btn" onclick="deleteTucao(${tucao.id})" title="删除">✕</button>

                        <div class="card-header">
                            <div class="author-info">
                                <div class="author-avatar" style="background: ${tucao.avatarColor}">
                                    ${tucao.author[0]}
                                </div>
                                <div class="author-meta">
                                    <span class="author-name">${escapeHtml(tucao.author)}</span>
                                    <span class="post-time">${timeStr}</span>
                                </div>
                            </div>
                            <span class="category-tag tag-${tucao.category}">${categoryNames[tucao.category]}</span>
                        </div>

                        <div class="tucao-content">${escapeHtml(tucao.content)}</div>

                        ${imagesHtml}
                        ${voteHtml}

                        <div class="card-footer">
                            <button class="action-btn ${tucao.liked ? 'liked' : ''}" onclick="toggleLike(${tucao.id})">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="${tucao.liked ? '#FF6B6B' : 'none'}" stroke="currentColor" stroke-width="2">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                </svg>
                                <span class="action-count">${tucao.likes}</span>
                            </button>

                            <button class="action-btn" onclick="toggleComments(${tucao.id})">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                                </svg>
                                <span class="action-count">${tucao.comments}</span>
                            </button>

                            <button class="action-btn" onclick="shareTucao(${tucao.id})">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="18" cy="5" r="3"></circle>
                                    <circle cx="6" cy="12" r="3"></circle>
                                    <circle cx="18" cy="19" r="3"></circle>
                                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                                </svg>
                                分享
                            </button>
                        </div>

                        ${commentsHtml}
                    </div>
                `;
            }).join('');
        }

        function renderVote(tucao) {
            if (!tucao.vote) return '';
            const total = tucao.vote.options.reduce((sum, o) => sum + o.count, 0);

            return `
                <div class="vote-section">
                    <div class="vote-title">📊 ${escapeHtml(tucao.vote.question)}</div>
                    <div class="vote-options">
                        ${tucao.vote.options.map((opt, i) => {
                            const percent = total > 0 ? Math.round((opt.count / total) * 100) : 0;
                            const isSelected = tucao.vote.voted === i;
                            return `
                                <div class="vote-option ${isSelected ? 'selected' : ''}" onclick="vote(${tucao.id}, ${i})">
                                    <span style="min-width: 120px; font-size: 0.9rem;">${escapeHtml(opt.text)}</span>
                                    <div class="vote-bar-bg">
                                        <div class="vote-bar-fill" style="width: ${percent}%"></div>
                                    </div>
                                    <span class="vote-count">${opt.count}票</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function vote(id, optionIndex) {
            const tucao = tucaos.find(t => t.id === id);
            if (!tucao || !tucao.vote) return;

            if (tucao.vote.voted !== -1) {
                tucao.vote.options[tucao.vote.voted].count--;
            }

            if (tucao.vote.voted === optionIndex) {
                tucao.vote.voted = -1;
            } else {
                tucao.vote.voted = optionIndex;
                tucao.vote.options[optionIndex].count++;
            }

            saveTucaos();
            renderTucaos();
        }

        function toggleComments(id) {
            const section = document.getElementById(`comments-${id}`);
            if (section) {
                section.classList.toggle('show');
            }
        }

        function submitComment(id) {
            const input = document.getElementById(`comment-input-${id}`);
            const text = input.value.trim();
            if (!text) return;

            const tucao = tucaos.find(t => t.id === id);
            if (!tucao) return;

            const names = ['路人甲', '吃瓜群众', '键盘侠', '匿名用户', '围观群众'];
            tucao.commentsList.push({
                author: names[Math.floor(Math.random() * names.length)],
                text: text,
                time: Date.now()
            });
            tucao.comments++;

            saveTucaos();
            input.value = '';
            renderTucaos();

            setTimeout(() => {
                const section = document.getElementById(`comments-${id}`);
                if (section) section.classList.add('show');
            }, 100);
        }

        function toggleLike(id) {
            const tucao = tucaos.find(t => t.id === id);
            if (tucao) {
                tucao.liked = !tucao.liked;
                tucao.likes += tucao.liked ? 1 : -1;
                saveTucaos();
                updateStats();
                renderTucaos();
            }
        }

        function shareTucao(id) {
            const tucao = tucaos.find(t => t.id === id);
            if (tucao) {
                const text = `${tucao.author}：${tucao.content.substring(0, 50)}...`;
                if (navigator.share) {
                    navigator.share({ title: '吐槽大会', text: text });
                } else {
                    navigator.clipboard.writeText(text).then(() => {
                        alert('📋 已复制到剪贴板！');
                    });
                }
            }
        }

        function deleteTucao(id) {
            if (confirm('确定要删除这条吐槽吗？')) {
                tucaos = tucaos.filter(t => t.id !== id);
                saveTucaos();
                updateStats();
                renderTucaos();
            }
        }

        function openImageModal(src) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            img.src = src;
            modal.classList.add('show');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('show');
        }

        function filterByTag(tag) {
            searchTag = tag;
            document.querySelectorAll('.trend-tag').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderTucaos();
        }

        function saveTucaos() {
            localStorage.setItem('tucaos', JSON.stringify(tucaos));
        }

        function formatTime(timestamp) {
            const diff = Date.now() - timestamp;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 7) return `${days}天前`;
            return new Date(timestamp).toLocaleDateString('zh-CN');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
